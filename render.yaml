services:
  - type: web
    name: syntaxify-backend
    runtime: docker
    dockerfilePath: backend.Dockerfile
    rootDir: .
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: ALLOWED_ORIGINS
        value: "*"
  - type: web
    name: syntaxify-frontend
    runtime: static
    buildCommand: |
      unzip -o codex-syntaxify-main.zip
    staticPublishPath: codex-syntaxify-main/codex-syntaxify-main/frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: true