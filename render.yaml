services:
  - type: web
    name: syntaxify-backend
    runtime: docker
    dockerfilePath: backend.Dockerfile
    rootDir: .
    envVars:
      - key: OPENAI_API_KEY
        value: dummy
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ALLOWED_ORIGINS
        value: https://syntaxify-frontend.onrender.com
  - type: web
    name: syntaxify-frontend
    runtime: docker
    dockerfilePath: frontend.Dockerfile
    rootDir: .
    envVars:
      - key: VITE_API_BASE_URL
        value: https://syntaxify-backend.onrender.com